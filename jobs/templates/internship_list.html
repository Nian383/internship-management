<!DOCTYPE html>
<html>
<head>
    <title>实习信息列表</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        table { border-collapse: collapse; width: 600px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background: #f0f0f0; }
    </style>
</head>
<body>
    <h2>📋 实习信息列表</h2>
    <table>
        <tr><th>学生</th><th>企业</th><th>岗位</th><th>开始日期</th></tr>
        {% for row in data %}
        <tr>
            <td>{{ row.0 }}</td>
            <td>{{ row.1 }}</td>
            <td>{{ row.2 }}</td>
            <td>{{ row.3 }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
